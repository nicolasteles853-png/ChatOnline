<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">

<meta
name="viewport"
content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"
>

<title>Chat Premium</title>

<script src="/socket.io/socket.io.js"></script>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
-webkit-tap-highlight-color:transparent;
}

html,
body{
width:100%;
height:100%;
overflow:hidden;
font-family:Arial,sans-serif;
background:#0f172a;
}

body{
display:flex;
}

.app{
width:100%;
height:100%;
display:flex;
overflow:hidden;
}

.sidebar{
width:90px;
background:#111827;
border-right:1px solid #1e293b;
display:flex;
flex-direction:column;
overflow-y:auto;
flex-shrink:0;
}

.sidebar-header{
padding:10px;
display:flex;
flex-direction:column;
align-items:center;
gap:8px;
border-bottom:1px solid #1e293b;
}

.avatar-sm{
width:50px;
height:50px;
border-radius:50%;
border:2px solid #6366f1;
object-fit:cover;
}

#myName{
font-size:12px;
color:white;
text-align:center;
word-break:break-word;
}

.contacts{
flex:1;
overflow-y:auto;
padding:5px;
}

.contact{
width:100%;
display:flex;
flex-direction:column;
align-items:center;
gap:5px;
padding:10px 5px;
border-radius:12px;
cursor:pointer;
margin-bottom:6px;
}

.contact.active{
background:#1e293b;
}

.contact-avatar{
width:50px;
height:50px;
border-radius:50%;
object-fit:cover;
border:2px solid #10b981;
}

.contact-name{
font-size:11px;
text-align:center;
color:white;
word-break:break-word;
}

.main{
flex:1;
display:flex;
flex-direction:column;
height:100%;
overflow:hidden;
}

.chat-header{
width:100%;
height:70px;
background:#111827;
border-bottom:1px solid #1e293b;
display:flex;
align-items:center;
padding:10px;
gap:10px;
flex-shrink:0;
}

.chat-header img{
width:45px;
height:45px;
border-radius:50%;
object-fit:cover;
border:2px solid #10b981;
}

.chat-header .name{
font-size:15px;
font-weight:bold;
color:white;
}

.status{
font-size:12px;
color:#10b981;
}

.messages{
flex:1;
overflow-y:auto;
padding:10px;
display:flex;
flex-direction:column;
gap:10px;
}

.msg{
max-width:85%;
padding:10px;
border-radius:16px;
word-break:break-word;
}

.msg.own{
align-self:flex-end;
background:#6366f1;
color:white;
}

.msg.other{
align-self:flex-start;
background:#1e293b;
color:white;
}

.msg-header{
display:flex;
align-items:center;
gap:5px;
margin-bottom:5px;
}

.avatar-xs{
width:24px;
height:24px;
border-radius:50%;
object-fit:cover;
}

.msg-name{
font-size:12px;
font-weight:bold;
}

.msg-time{
font-size:10px;
opacity:.7;
margin-left:auto;
}

.msg-text{
font-size:14px;
line-height:1.4;
}

.media-preview{
margin-top:8px;
overflow:hidden;
border-radius:12px;
}

.media-preview img,
.media-preview video{
width:100%;
max-height:250px;
object-fit:cover;
border-radius:12px;
}

.media-preview audio{
width:100%;
}

.chat-footer{
width:100%;
padding:10px;
background:#111827;
border-top:1px solid #1e293b;
display:flex;
align-items:center;
gap:8px;
flex-shrink:0;
}

.chat-input{
flex:1;
height:45px;
border:none;
outline:none;
padding:0 14px;
border-radius:30px;
background:#1e293b;
color:white;
font-size:15px;
min-width:0;
}

.file-btn,
.send-btn,
.call-btn{
width:45px;
height:45px;
border:none;
border-radius:50%;
display:flex;
align-items:center;
justify-content:center;
font-size:18px;
cursor:pointer;
color:white;
flex-shrink:0;
}

.file-btn{
background:#8b5cf6;
}

.send-btn{
background:#6366f1;
}

.call-btn{
background:#10b981;
}

.typing-label{
font-size:10px;
color:#fbbf24;
margin-top:2px;
text-align:center;
}

@media(max-width:700px){

.sidebar{
width:75px;
}

.contact-avatar{
width:45px;
height:45px;
}

.chat-header .name{
font-size:14px;
}

.chat-input{
font-size:14px;
}

}

</style>
</head>

<body>

<div class="app">

<div class="sidebar">

<div class="sidebar-header">

<img
id="myAvatar"
class="avatar-sm"
src=""
>

<div id="myName">
Você
</div>

</div>

<div
class="contacts"
id="contactsList"
></div>

</div>

<div class="main">

<div class="chat-header">

<img
id="activeAvatar"
src="https://ui-avatars.com/api/?name=User"
>

<div>

<div
class="name"
id="activeName"
>
Selecione alguém
</div>

<div
class="status"
id="statusText"
>
Offline
</div>

</div>

</div>

<div
class="messages"
id="messagesArea"
></div>

<div class="chat-footer">

<input
type="file"
id="mediaInput"
accept="image/*,video/*,audio/*"
style="display:none"
>

<button
class="file-btn"
onclick="document.getElementById('mediaInput').click()"
>
📎
</button>

<input
type="text"
class="chat-input"
id="messageInput"
placeholder="Digite uma mensagem..."
>

<button
class="send-btn"
onclick="sendMessage()"
>
➤
</button>

<button
class="call-btn"
onclick="callVoice()"
>
📞
</button>

</div>

</div>

</div>

<script src="/app.js"></script>

</body>
</html>
